<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${project.title} + ' — Jordan Kellogg'">Project — Jordan Kellogg</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

    <!-- Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="project-detail">
        <a th:href="@{/}" class="back-link">&larr; Back to Projects</a>

        <article>
            <h1 th:text="${project.title}">Project Title</h1>
            <p class="project-date">
                Added <span th:text="${#temporals.format(project.dateAdded, 'MMMM d, yyyy')}">January 1, 2025</span>
            </p>

            <img th:if="${project.thumbnailUrl != null and !project.thumbnailUrl.isBlank()}"
                 th:src="${project.thumbnailUrl}"
                 th:alt="${project.title}"
                 class="project-detail-thumbnail">

            <div class="project-description">
                <p th:text="${project.description}">Full project description goes here.</p>
            </div>

            <div class="project-detail-links">
                <a th:if="${project.liveDemoUrl != null and !project.liveDemoUrl.isBlank()}"
                   th:href="${project.liveDemoUrl}"
                   target="_blank" rel="noopener noreferrer"
                   class="btn btn-primary">Live Demo</a>
                <a th:if="${project.sourceCodeUrl != null and !project.sourceCodeUrl.isBlank()}"
                   th:href="${project.sourceCodeUrl}"
                   target="_blank" rel="noopener noreferrer"
                   class="btn btn-secondary">Source Code</a>
            </div>
        </article>
    </main>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
