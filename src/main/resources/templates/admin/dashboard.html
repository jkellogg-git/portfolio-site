<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Dashboard</title>
</head>
<body>

<header>
    <h1>Admin Dashboard</h1>
    <nav>
        <a href="/">← Back to Site</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit">Logout</button>
        </form>
    </nav>
</header>

<main>
    <!-- Flash success message -->
    <div th:if="${successMessage}" style="color: green; border: 1px solid green; padding: 10px; margin-bottom: 15px;">
        <p th:text="${successMessage}"></p>
    </div>

    <section>
        <h2>Projects</h2>
        <a th:href="@{/admin/projects/new}">+ Add New Project</a>

        <div th:if="${#lists.isEmpty(projects)}">
            <p>No projects yet. Add your first one!</p>
        </div>

        <table th:unless="${#lists.isEmpty(projects)}" border="1" cellpadding="8" cellspacing="0" style="width:100%; margin-top:15px;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Date Added</th>
                    <th>Links</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="project : ${projects}">
                    <td th:text="${project.id}"></td>
                    <td th:text="${project.title}"></td>
                    <td th:text="${project.dateAdded}"></td>
                    <td>
                        <a th:if="${project.liveDemoUrl}" th:href="${project.liveDemoUrl}" target="_blank">Demo</a>
                        <span th:if="${project.liveDemoUrl != null and project.sourceCodeUrl != null}"> | </span>
                        <a th:if="${project.sourceCodeUrl}" th:href="${project.sourceCodeUrl}" target="_blank">Source</a>
                    </td>
                    <td>
                        <a th:href="@{/admin/projects/{id}/edit(id=${project.id})}">Edit</a>
                        &nbsp;
                        <form th:action="@{/admin/projects/{id}/delete(id=${project.id})}" method="post" style="display:inline;"
                              onsubmit="return confirm('Are you sure you want to delete this project?');">
                            <button type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>
</main>

</body>
</html>
